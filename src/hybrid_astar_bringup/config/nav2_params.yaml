# Nav2 Parameters for Hybrid A* Planner Demo

map_server:
  ros__parameters:
    yaml_filename: ""  # Set via launch argument
    use_sim_time: false

planner_server:
  ros__parameters:
    use_sim_time: false
    planner_plugins: ["HybridAStar"]

    HybridAStar:
      plugin: "hybrid_astar_planner::HybridAStarPlanner"

      vehicle:
        wheelbase: 0.18
        length: 0.30
        width: 0.20
        rear_axle_to_back: 0.06
        max_steering_angle: 30.0

      motion:
        step_size: 0.05
        num_steering_angles: 5
        allow_reverse: true

      search:
        xy_resolution: 0.05
        theta_resolution: 5.0
        shot_distance: 2.0
        max_iterations: 100000
        timeout: 5.0

      cost:
        steering_penalty: 1.5
        reversing_penalty: 2.0
        steering_change_penalty: 1.5
        direction_switch_penalty: 10.0
        non_straight_penalty: 0.03
        change_direction_penalty: 0.05
        cost_penalty_alpha: 1.5

      heuristic:
        type: "max"
        cost_alpha: 1.0

      goal:
        xy_tolerance: 0.05
        theta_tolerance: 10.0

      smoother:
        enabled: true
        w_smooth: 0.4
        w_obstacle: 0.3
        w_original: 0.3
        obstacle_margin: 0.15
        max_iterations: 200

# Global costmap configuration
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: base_link
      update_frequency: 1.0
      publish_frequency: 1.0
      rolling_window: false
      width: 10
      height: 10
      resolution: 0.05
      track_unknown_space: true

      plugins: ["static_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.30

lifecycle_manager:
  ros__parameters:
    use_sim_time: false
    autostart: true
    bond_timeout: 0.0
    node_names:
      - "map_server"
      - "planner_server"
